name: Atualizar Progresso IDC

on:
  push:
    branches: [master]
    paths:
      - 'empresas/**'
  workflow_dispatch:
    inputs:
      mensagem:
        description: 'Motivo da atualização manual (opcional)'
        required: false
        default: 'atualização manual via GitHub Actions'

jobs:
  atualizar-progresso:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Escanear coletas e atualizar progresso.md
        run: |
          python3 << 'EOF'
          import os
          import re
          from datetime import datetime

          EMPRESAS = [
              ("MERCADO LIVRE",  "mercado-livre"),
              ("NUBANK",         "nubank"),
              ("ITAÚ",           "itau"),
              ("GOOGLE BRASIL",  "google-brasil"),
              ("PETROBRAS",      "petrobras"),
              ("MAGAZINE LUIZA", "magazine-luiza"),
              ("IFOOD",          "ifood"),
              ("WEG",            "weg"),
              ("AMBEV",          "ambev"),
              ("CORREIOS",       "correios"),
              ("MCKINSEY BRASIL","mckinsey-brasil"),
              ("UBER/99",        "uber-99"),
          ]

          SESSOES = ["s1_glassdoor", "s2a_linkedin_empresa", "s2b_linkedin_excolab", "s2c_linkedin_lideranca", "s2d_linkedin_vagas", "s2e_linkedin_recrutadores", "s3a_reclameaqui", "s3b_jusbrasil", "s3c_investorrelations", "sintese"]

          def check(slug, sessao):
              base = f"empresas/{slug}"
              # Arquivo fatiado direto
              if os.path.isfile(f"{base}/{sessao}.md"):
                  return True
              # Fallback: s2_linkedin.md legado cobre s2a-s2d
              legacy = f"{base}/s2_linkedin.md"
              if sessao in ("s2a_linkedin_empresa", "s2b_linkedin_excolab", "s2c_linkedin_lideranca", "s2d_linkedin_vagas"):
                  return os.path.isfile(legacy)
              # Fallback: s2_linkedin.md legado cobre s2e se contiver PARTE E ou RECRUTADORES
              if sessao == "s2e_linkedin_recrutadores":
                  if os.path.isfile(legacy):
                      with open(legacy, "r", encoding="utf-8", errors="ignore") as fh:
                          c = fh.read()
                      return "PARTE E" in c or "RECRUTADORES" in c
              return False

          hoje = datetime.now().strftime("%Y-%m-%d")
          completas = 0
          sintetizadas = 0

          linhas_progresso = []
          for nome, slug in EMPRESAS:
              partes = []
              for sessao in SESSOES:
                  partes.append("[x]" if check(slug, sessao) else "[_]")
              s1, s2a, s2b, s2c, s2d, s2e, s3a, s3b, s3c, sint = partes
              linha = f"{nome:<18} s1{s1} s2a{s2a} s2b{s2b} s2c{s2c} s2d{s2d} s2e{s2e} s3a{s3a} s3b{s3b} s3c{s3c} sintese{sint}"
              linhas_progresso.append(linha)
              if all(p == "[x]" for p in partes[:9]):
                  completas += 1
              if partes[9] == "[x]":
                  sintetizadas += 1

          analise = "SIM" if sintetizadas >= 3 else ("NAO (minimo 3 sinteses - " + str(sintetizadas) + " disponiveis)")

          bloco = "\n".join(linhas_progresso)

          # Preserva historico existente se possivel
          try:
              with open("progresso.md", "r", encoding="utf-8", errors="replace") as fh:
                  conteudo_atual = fh.read()
              match = re.search(r'## HISTORICO DE SESSOES\n(.*?)(\n## |\Z)', conteudo_atual, re.DOTALL)
              historico = match.group(1).strip() if match else "| Data | Empresa | Sessao | Status |\n|---|---|---|---|\n| - | - | - | Nenhuma sessao registrada ainda |"
          except Exception:
              historico = "| Data | Empresa | Sessao | Status |\n|---|---|---|---|\n| - | - | - | Nenhuma sessao registrada ainda |"

          sep = "---"
          fence = "```"
          lines = [
              "# Progresso IDC",
              "## Ultima atualizacao: " + hoje + " (GitHub Actions)",
              "",
              sep,
              "",
              fence,
              "PROGRESSO -- ultima atualizacao: " + hoje,
              "",
              bloco,
              "",
              "Legenda: [x] = commitado  [~] = parcial  [_] = pendente",
              "",
              "Empresas com coleta completa (9/9 - inclui s2a-s2e): " + str(completas),
              "Empresas com sintese pronta: " + str(sintetizadas),
              "Analise cruzada disponivel: " + analise,
              fence,
              "",
              sep,
              "",
              "## HISTORICO DE SESSOES",
              "",
              historico,
              "",
              sep,
              "",
              "*progresso.md - IDC Ascendimacy - Atualizado automaticamente via GitHub Actions*",
          ]
          conteudo_progresso = "\n".join(lines) + "\n"

          with open("progresso.md", "w", encoding="utf-8") as fh:
              fh.write(conteudo_progresso)

          print("OK progresso.md atualizado - " + str(completas) + "/12 completas (9/9), " + str(sintetizadas) + "/12 sintetizadas")
          EOF

      - name: Commit progresso.md se houve mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet progresso.md || (
            git add progresso.md &&
            git commit -m "auto: atualiza progresso.md [skip ci]" &&
            git push
          )
          echo "✅ Done"
